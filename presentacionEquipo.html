<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación del Equipo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-top: 0;
        }
        p {
            color: #7f8c8d;
            font-size: 1.1em;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
        }
        li {
            margin-bottom: 12px;
            padding-left: 30px;
            position: relative;
            font-size: 1.05em;
        }
        /* Viñetas personalizadas */
        li::before {
            content: "•";
            color: #3498db; /* Color azul para la viñeta */
            font-weight: bold;
            font-size: 1.5em;
            position: absolute;
            left: 10px;
            top: -2px;
        }
        .puesto {
            color: #7f8c8d;
            font-size: 0.9em;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Presentación del Equipo</h1>
        <p>Conoce a los miembros del equipo para este proyecto:</p>
        
        <ul>
            <li><strong></strong> <span class="puesto"></span></li>
            <li><strong></strong> <span class="puesto"></span></li>
            <li><strong></strong> <span class="puesto"></span></li>
            <li><strong></strong> <span class="puesto"></span></li>
	    <li><strong></strong> <span class="puesto"></span></li>
        </ul>
    </div>

</body>
</html>
